services:
  postgres:
    image: postgres:16
    container_name: internproj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internproj
    ports:
      - "5432:5432"
    volumes:
      - internproj_pgdata:/var/lib/postgresql/data

volumes:
  internproj_pgdata:

